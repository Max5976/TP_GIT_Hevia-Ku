<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">🎓 Promo 2026</div>
    <nav>
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#propuestas">Propuestas</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="hero">
        <h1>Propuestas Último Año</h1>
        <p>Votá y enviá tus ideas para que este año sea épico.</p>
        
        <div class="voto-container">
            <button type="button" id="votar">🔥 Apoyar esta idea</button>
            <p id="contador">Votos: <strong>0</strong></p>
        </div>
    </section>

    <section id="propuestas" class="form-section">
        <form id="formPropuesta">
            <h2>Nueva Propuesta</h2>
            
            <label for="nombre">Tu nombre</label>
            <input type="text" id="nombre" placeholder="Escribí tu nombre..." required>

            <label for="idea">Tu idea</label>
            <textarea id="idea" rows="4" placeholder="¿Qué tenés en mente?" required></textarea>

            <button type="submit">Enviar propuesta</button>
            <p id="mensaje"></p>
        </form>
    </section>
</main>

<footer>
    <p>Promoción 2026</p>
    <div class="socials">
        <a href="https://instagram.com" target="_blank">Instagram</a>
        <a href="https://whatsapp.com" target="_blank">WhatsApp</a>
    </div>
</footer>

<script src="script.js"></script>

</body>
</html>
